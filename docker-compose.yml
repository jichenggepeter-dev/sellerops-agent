services:
  api:
    build: .
    ports:
      - "8010:8010"
    environment:
      SELLEROPS_ENV: local
      SELLEROPS_DATABASE_URL: ${SELLEROPS_DATABASE_URL:-}
      SELLEROPS_DB_PATH: /app/data/sellerops.db
      SELLEROPS_CORS_ORIGINS: "*"
      SELLEROPS_TRIAGE_PROVIDER: ${SELLEROPS_TRIAGE_PROVIDER:-mock}
      SELLEROPS_TRIAGE_FALLBACK_TO_MOCK: ${SELLEROPS_TRIAGE_FALLBACK_TO_MOCK:-true}
      SELLEROPS_OPENAI_API_KEY: ${SELLEROPS_OPENAI_API_KEY:-}
      SELLEROPS_OPENAI_MODEL: ${SELLEROPS_OPENAI_MODEL:-gpt-4o-mini}
      SELLEROPS_SLACK_WEBHOOK_URL: ${SELLEROPS_SLACK_WEBHOOK_URL:-}
      SELLEROPS_GITHUB_TOKEN: ${SELLEROPS_GITHUB_TOKEN:-}
      SELLEROPS_GITHUB_REPO: ${SELLEROPS_GITHUB_REPO:-}
      SELLEROPS_STRIPE_API_KEY: ${SELLEROPS_STRIPE_API_KEY:-}
      SELLEROPS_STRIPE_ALLOW_LIVE_MODE: ${SELLEROPS_STRIPE_ALLOW_LIVE_MODE:-false}
    volumes:
      - sellerops_data:/app/data

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sellerops
      POSTGRES_USER: sellerops
      POSTGRES_PASSWORD: sellerops
    volumes:
      - sellerops_postgres:/var/lib/postgresql/data

volumes:
  sellerops_data:
  sellerops_postgres:
